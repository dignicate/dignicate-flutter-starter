name: providers
publish_to: "none"
version: 0.0.1

environment:
  sdk: ">=3.8.0 <4.0.0"

description: Providers package, centralised DI entry (AppDeps + appDepsProvider).

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^3.0.3
  domain:
    path: ../domain
  viewmodel:
    path: ../viewmodel

# Note: intentionally not depending on data/app/ui packages.

dev_dependencies:
  flutter_lints: ^6.0.0

flutter:
  # minimal flutter section to satisfy analyzer for Flutter packages
  uses-material-design: true

